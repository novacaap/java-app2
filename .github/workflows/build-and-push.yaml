name: Build and Push
on:
  push:
    branches: [main, dev]
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  Build-and-Sonar:
    runs-on: ubuntu-latest
    if: ${{ vars.DOCKERHUB_USERNAME != '' || (vars.SONAR_HOST_URL != '' && vars.SONAR_PROJECT_KEY != '') }}
    env:
      GH_PACKAGES_USERNAME: ${{ secrets.GH_PACKAGES_USERNAME || github.actor }}
      GH_PACKAGES_PAT: ${{ secrets.GH_PACKAGES_PAT }}
      IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE }}
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
    outputs:
      docker_tag: ${{ steps.set_tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Configure Maven for GitHub Packages (env)
        run: |
          mkdir -p ~/.m2
          cp ci/settings.xml ~/.m2/settings.xml

      - name: Build and test (with optional Sonar and quality gate check)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_HOST_URL" ] && [ -n "$SONAR_PROJECT_KEY" ]; then
            # Single Maven run: verify (tests + JaCoCo) then Sonar with quality gate (fails job if gate fails)
            SONAR_ARGS="-Dsonar.token=$SONAR_TOKEN -Dsonar.host.url=$SONAR_HOST_URL -Dsonar.projectKey=$SONAR_PROJECT_KEY"
            SONAR_ARGS="$SONAR_ARGS -Dsonar.qualitygate.wait=true -Dsonar.qualitygate.timeout=300"
            SONAR_ARGS="$SONAR_ARGS -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml"
            [ -n "$SONAR_ORGANIZATION" ] && SONAR_ARGS="$SONAR_ARGS -Dsonar.organization=$SONAR_ORGANIZATION"
            mvn --batch-mode -Dmaven.project.sourceRoots.warningsDisabled=true verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar $SONAR_ARGS
          else
            mvn --batch-mode package
          fi

      - name: Quality gate check passed
        if: success() && vars.SONAR_HOST_URL != '' && vars.SONAR_PROJECT_KEY != ''
        run: echo "Sonar quality gate check passed (build would have failed if gate failed)."

      - name: Get project coordinates from pom
        id: get_pom_props
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "artifactId=$ARTIFACT_ID" >> $GITHUB_OUTPUT
          echo "name=${ARTIFACT_ID}-jar-${VERSION}" >> $GITHUB_OUTPUT
          echo "jar_file=${ARTIFACT_ID}-${VERSION}.jar" >> $GITHUB_OUTPUT

      - name: Set Docker tag
        id: set_tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}-$SHORT_SHA" >> $GITHUB_OUTPUT
          else
            YYMMDDHH=$(date +%y%m%d%H)
            echo "tag=${{ github.ref_name }}-${YYMMDDHH}-${SHORT_SHA}-${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            JAR_FILE=${{ steps.get_pom_props.outputs.jar_file }}
            REPO_NAME=${{ github.event.repository.name }}
          platforms: linux/amd64
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.set_tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  Notify-Teams:
    needs: Build-and-Sonar
    if: always()
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
      IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE }}
    steps:
      - name: Checkout for fallback tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Compute fallback tag
        id: fallback_tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}-$SHORT_SHA" >> $GITHUB_OUTPUT
          else
            YYMMDDHH=$(date +%y%m%d%H)
            echo "tag=${{ github.ref_name }}-${YYMMDDHH}-${SHORT_SHA}-${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Notify Microsoft Teams
        continue-on-error: true
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          BUILD_RESULT: ${{ needs.Build-and-Sonar.result }}
          DOCKER_TAG: ${{ needs.Build-and-Sonar.outputs.docker_tag }}
          FALLBACK_TAG: ${{ steps.fallback_tag.outputs.tag }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi
          STATUS="$BUILD_RESULT"
          USE_TAG="${DOCKER_TAG}"
          [ -z "$USE_TAG" ] && USE_TAG="${FALLBACK_TAG}"
          [ -z "$USE_TAG" ] && USE_TAG="(not built)"
          [ "$STATUS" = "success" ] && THEME="0076D7" || THEME="D13438"
          if [ "$BUILD_RESULT" = "success" ]; then
            IMAGE_LINE="${DOCKERHUB_USERNAME}/${IMAGE_NAME}:${USE_TAG}"
            TITLE="Build and Push (Docker Hub)"
          else
            IMAGE_LINE="Build skipped or failed (DOCKERHUB_USERNAME not set or error)"
            TITLE="Build and Push"
          fi
          BODY=$(jq -n \
            --arg theme "$THEME" \
            --arg status "$STATUS" \
            --arg title "$TITLE" \
            --arg repo "${{ github.repository }}" \
            --arg ref "${{ github.ref_name }}" \
            --arg sha "${{ github.sha }}" \
            --arg image "$IMAGE_LINE" \
            --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{
              "@type": "MessageCard",
              "@context": "https://schema.org/extensions",
              "themeColor": $theme,
              "summary": ($title + " - " + $status),
              "sections": [
                {
                  "activityTitle": $title,
                  "activitySubtitle": $repo,
                  "facts": [
                    { "name": "Status", "value": $status },
                    { "name": "Ref", "value": $ref },
                    { "name": "Commit", "value": $sha },
                    { "name": "Image", "value": $image },
                    { "name": "Run", "value": ("[View workflow](" + $runUrl + ")") }
                  ]
                }
              ]
            }')
          curl -sS -X POST -H "Content-Type: application/json" -d "${BODY}" "$TEAMS_WEBHOOK_URL"

  Details:
    needs: Build-and-Sonar
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write run summary
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BUILD_RESULT="${{ needs.Build-and-Sonar.result }}"
          DOCKER_TAG="${{ needs.Build-and-Sonar.outputs.docker_tag }}"
          DOCKERHUB_USERNAME="${{ vars.DOCKERHUB_USERNAME }}"
          IMAGE_NAME="${{ vars.DOCKERHUB_IMAGE }}"
          {
            echo "## Run summary"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Event | ${{ github.event_name }} |"
            echo "| Ref | \`${{ github.ref_name }}\` |"
            echo "| Actor | ${{ github.actor }} |"
            echo "| Commit | [\`${SHORT_SHA}\`](${COMMIT_URL}) |"
            echo ""
            echo "### Jobs"
            echo ""
            echo "| Job | Status | Details |"
            echo "|-----|--------|---------|"
            if [ "$BUILD_RESULT" = "success" ]; then
              echo "| Build-and-Sonar | ${BUILD_RESULT} | \`${DOCKERHUB_USERNAME}/${IMAGE_NAME}:${DOCKER_TAG}\` |"
            elif [ "$BUILD_RESULT" = "skipped" ]; then
              echo "| Build-and-Sonar | skipped | DOCKERHUB_USERNAME and Sonar vars not set |"
            else
              echo "| Build-and-Sonar | ${BUILD_RESULT} | - |"
            fi
            echo ""
            echo "**[View workflow run](${RUN_URL})**"
          } >> $GITHUB_STEP_SUMMARY
