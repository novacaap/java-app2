# Server
server.port=8090
# Application
spring.application.name=java-app2
# Swagger / OpenAPI (springdoc)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# External API URL for Swagger / OpenAPI (driven by env)
# Defaults are suitable for local dev; override via environment variables:
#   API_EXTERNAL_SCHEME (http/https)
#   API_EXTERNAL_HOST   (host:port)
#   API_EXTERNAL_BASE_PATH (leading slash, e.g. / or /api)
api.external.scheme=${API_EXTERNAL_SCHEME:https}
api.external.host=${API_EXTERNAL_HOST:localhost:8090}
api.external.base-path=${API_EXTERNAL_BASE_PATH:/}
